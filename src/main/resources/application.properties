spring.application.name=ai-recruitment-event-platform
server.port=${PORT:8080}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

jwt.secret=changeit1234567890changeit1234567890changeit1234567890
jwt.expiration-ms=86400000

app.base-url=${APP_BASE_URL}
app.frontend-url=${APP_FRONTEND_URL}
app.base-qr-url=${APP_QR_URL_BASE}
app.api-cors-url=${APP_BASE_URL}
app.upload-dir=uploads

gemini.api-key=${GEMINI_API_KEY}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}

spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.connectiontimeout=${SMTP_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${SMTP_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${SMTP_WRITETIMEOUT:5000}

app.mail.from=${SMTP_FROM:}

# AI Resume Analysis Batch Processing Configuration
app.ai.batch-size=${APP_AI_BATCH_SIZE:5}
app.ai.batch-interval-ms=${APP_AI_BATCH_INTERVAL_MS:30000}
app.ai.batch-processing-enabled=${APP_AI_BATCH_PROCESSING_ENABLED:true}

# AI Resume Analysis Retry Configuration
app.ai.max-retries=${APP_AI_MAX_RETRIES:3}
app.ai.retry-backoff-multiplier=${APP_AI_RETRY_BACKOFF_MULTIPLIER:2}
app.ai.retry-delay-seconds=${APP_AI_RETRY_DELAY_SECONDS:60}

# Logging: show real-time AI resume parsing in the terminal
logging.level.com.hackathon.service.ParticipantAiAnalysisService=INFO
logging.level.com.hackathon.service.ParticipantAiBatchProcessingService=INFO
logging.level.com.hackathon=INFO



